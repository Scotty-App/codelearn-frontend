<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title> ScottyApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand">ScottyApp | Juego</span>
        <button onclick="location.href='index.html'" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4 card p-3 shadow-sm">
                <h5>Perfil del Programador</h5>
                <hr>
                <p><strong>Jugador:</strong> <span id="pNombre"></span></p>
                <p><strong>Ruta:</strong> <span class="badge bg-success" id="pLenguaje"></span></p>
                <p><strong>Contacto:</strong> <span id="pTel"></span></p>
            </div>
            <div class="col-md-8">
                <div class="card p-4 bg-light border-primary">
                    <h4>Misión: El Primer Loop</h4>
                    <p>Haz clic en el botón para simular la ejecución de tu código en <span id="pLenguaje2"></span>.</p>
                    <div class="bg-dark p-3 rounded text-success font-monospace">
                        <code>while(game.active) { scotty.run(); }</code>
                    </div>
                    <button class="btn btn-primary mt-3" onclick="alert('¡Código ejecutado con éxito! +10 puntos de experiencia')">Probar código</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const u = JSON.parse(localStorage.getItem('usuarioRegistrado'));
        if(!u) window.location.href = "index.html";
        document.getElementById('pNombre').innerText = u.nombre;
        document.getElementById('pTel').innerText = u.tel;
        document.getElementById('pLenguaje').innerText = u.lenguaje;
        document.getElementById('pLenguaje2').innerText = u.lenguaje;
    </script>
</body>
</html>
