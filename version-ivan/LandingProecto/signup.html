<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - ScottyApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 card shadow p-4">
                <h3 class="text-center mb-4">Crea tu cuenta</h3>
                <form id="regForm">
                    <div class="mb-3"><input type="text" id="nombre" class="form-control" placeholder="Nombre" required></div>
                    <div class="mb-3"><input type="email" id="email" class="form-control" placeholder="Email" required></div>
                    <div class="mb-3"><input type="tel" id="tel" class="form-control" placeholder="Teléfono" required></div>
                    <div class="mb-3"><input type="password" id="pass" class="form-control" placeholder="Contraseña" required></div>
                    <button type="submit" class="btn btn-success w-100">Registrarme</button>
                </form>
                <p class="mt-3 text-center">¿Ya tienes cuenta? <a href="login.html">Entra aquí</a></p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const usuario = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                tel: document.getElementById('tel').value,
                pass: document.getElementById('pass').value,
                lenguaje: sessionStorage.getItem('lenguajeElegido') || 'General'
            };
            localStorage.setItem('usuarioRegistrado', JSON.stringify(usuario));
            alert(" Correo de confirmación enviado a " + usuario.email);
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
