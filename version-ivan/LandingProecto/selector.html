<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elegir Lenguaje - ScottyApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <h2 class="mb-4">¿Qué lenguaje quieres dominar hoy?</h2>
        <div class="row g-4 justify-content-center">
            <div class="col-md-3">
                <div class="card h-100 shadow-sm p-3">
                    <h3>🐍</h3>
                    <h4>Python</h4>
                    <p>Ideal para IA y scripts rápidos.</p>
                    <button class="btn btn-primary" onclick="seleccionar('Python')">Elegir</button>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 shadow-sm p-3">
                    <h3>🌐</h3>
                    <h4>JavaScript</h4>
                    <p>Domina la web y los juegos de navegador.</p>
                    <button class="btn btn-primary" onclick="seleccionar('JavaScript')">Elegir</button>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 shadow-sm p-3">
                    <h3>☕</h3>
                    <h4>Java</h4>
                    <p>El estándar de las grandes aplicaciones.</p>
                    <button class="btn btn-primary" onclick="seleccionar('Java')">Elegir</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function seleccionar(lenguaje) {
            sessionStorage.setItem('lenguajeElegido', lenguaje);
            if(!localStorage.getItem('usuarioRegistrado')) {
                alert("¡Buena elección! Ahora regístrate para guardar tu progreso.");
                window.location.href = "signup.html";
            } else {
                window.location.href = "app.html";
            }
        }
    </script>
</body>
</html>
