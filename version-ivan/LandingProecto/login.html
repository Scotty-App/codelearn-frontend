<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - ScottyApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="vh-100 d-flex align-items-center bg-dark text-white">
    <div class="container" style="max-width: 400px;">
        <div class="card p-4 text-dark">
            <h4 class="text-center">Iniciar Sesión</h4>
            <input type="email" id="lEmail" class="form-control mb-2" placeholder="Email">
            <input type="password" id="lPass" class="form-control mb-3" placeholder="Contraseña">
            <button onclick="login()" class="btn btn-primary w-100">Entrar</button>
            <div id="msg" class="text-danger mt-2 small text-center"></div>
        </div>
    </div>
    <script>
        function login() {
            const user = JSON.parse(localStorage.getItem('usuarioRegistrado'));
            const email = document.getElementById('lEmail').value;
            const pass = document.getElementById('lPass').value;
            if(user && user.email === email && user.pass === pass) {
                window.location.href = "app.html";
            } else {
                document.getElementById('msg').innerText = "Usuario o contraseña incorrectos";
            }
        }
    </script>
</body>
</html>
